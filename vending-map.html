<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>自販機マップ | Jihanki Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<style>
  :root{
    --ink:#10151c;
    --paper:#f3efe4;
    --steel:#2b3a4a;
    --steel-deep:#1a2530;
    --coin:#d4a13a;
    --neon:#ff5a3c;
    --ok:#3aa66b;
    --line:#c9c2ac;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--paper);font-family:'Segoe UI',-apple-system,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;color:var(--ink);overflow:hidden;}
  body{display:flex;flex-direction:column;height:100dvh;}

  /* ---- Screens ---- */
  .screen{display:none;flex-direction:column;height:100%;width:100%;position:absolute;inset:0;z-index:1;background:var(--paper);}
  .screen.active{display:flex;z-index:2;}

  /* ---- Home Screen ---- */
  #homeScreen .home-header{
    background:linear-gradient(180deg,var(--steel) 0%,var(--steel-deep) 100%);
    color:var(--paper);
    padding:20px 16px 16px;
    flex-shrink:0;
    box-shadow:0 3px 10px rgba(0,0,0,.35);
    position:relative;z-index:10;
  }
  #homeScreen .home-header h1{
    font-size:20px;font-weight:800;letter-spacing:.5px;
    display:flex;align-items:center;gap:8px;
  }
  #homeScreen .home-header h1 .dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--neon);box-shadow:0 0 8px var(--neon);flex-shrink:0;
  }
  #homeScreen .home-header .sub{font-size:11px;opacity:.65;margin-top:3px;letter-spacing:.5px;}
  .register-btn{
    display:block;width:100%;margin-top:14px;
    background:var(--neon);color:#fff;border:none;border-radius:12px;
    padding:14px;font-size:15px;font-weight:700;cursor:pointer;
    box-shadow:0 4px 12px rgba(255,90,60,.4);
    letter-spacing:.5px;
  }
  .register-btn:active{opacity:.85;}
  .mode-label{font-size:10px;opacity:.5;margin-top:6px;text-align:center;}

  .card-list{
    flex:1;overflow-y:auto;padding:12px 16px 80px;
    -webkit-overflow-scrolling:touch;
  }
  .card-list-title{font-size:13px;font-weight:700;color:var(--steel);margin-bottom:10px;letter-spacing:.3px;}
  .empty-msg{
    text-align:center;padding:48px 20px;color:#8a7e6a;font-size:14px;line-height:1.7;
  }
  .vm-card{
    display:flex;gap:12px;background:#fff;border-radius:14px;padding:12px;
    margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);
    cursor:pointer;border:1px solid rgba(0,0,0,.04);
    transition:box-shadow .15s;
  }
  .vm-card:active{box-shadow:0 2px 12px rgba(0,0,0,.12);}
  .vm-card-photo{
    width:72px;height:72px;border-radius:10px;overflow:hidden;flex-shrink:0;
    background:#e7e1d0;display:flex;align-items:center;justify-content:center;
    font-size:28px;color:#b8ad96;
  }
  .vm-card-photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .vm-card-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;}
  .vm-card-maker{font-size:14px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .vm-card-dist{font-size:12px;color:var(--neon);font-weight:700;margin-bottom:3px;}
  .vm-card-products{font-size:11px;color:#7a6e58;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* ---- Detail Modal ---- */
  .detail-overlay{
    position:fixed;inset:0;background:var(--paper);z-index:50;
    display:none;flex-direction:column;overflow:hidden;
  }
  .detail-overlay.show{display:flex;}
  .detail-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;flex-shrink:0;
    background:linear-gradient(180deg,var(--steel) 0%,var(--steel-deep) 100%);
    color:var(--paper);
  }
  .detail-header .detail-title{font-size:16px;font-weight:700;}
  .detail-header button{background:none;border:none;color:var(--paper);font-size:14px;cursor:pointer;padding:6px 10px;border-radius:8px;}
  .detail-header button:active{background:rgba(255,255,255,.1);}
  .detail-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .detail-photos{
    width:100%;height:48vh;min-height:300px;background:#1a1a1a;position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  .detail-photos .swipe-slide img{cursor:zoom-in;}
  .detail-photos .swipe-container{
    display:flex;width:100%;height:100%;transition:transform .3s ease;
  }
  .detail-photos .swipe-slide{
    min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  }
  .detail-photos .swipe-slide img{max-width:100%;max-height:100%;object-fit:contain;}
  .detail-photos .no-photo{color:#666;font-size:48px;}
  /* Fullscreen photo viewer */
  .photo-viewer{
    display:none;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.95);
    align-items:center;justify-content:center;
  }
  .photo-viewer.show{display:flex;}
  .photo-viewer img{
    max-width:100%;max-height:100%;object-fit:contain;
    touch-action:pinch-zoom;
  }
  .photo-viewer-close{
    position:absolute;top:14px;right:16px;width:40px;height:40px;border-radius:50%;
    background:rgba(255,255,255,.15);color:#fff;border:none;font-size:18px;cursor:pointer;z-index:1;
  }
  .photo-viewer-close:active{background:rgba(255,255,255,.3);}
  .detail-photos .photo-dots{
    position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
    display:flex;gap:6px;
  }
  .detail-photos .photo-dots span{
    width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);
  }
  .detail-photos .photo-dots span.active{background:#fff;}
  .detail-info{padding:18px 16px 100px;}
  .detail-info .d-maker{font-size:18px;font-weight:800;margin-bottom:12px;}
  .detail-info .d-section{margin-bottom:14px;}
  .detail-info .d-label{font-size:11px;font-weight:700;color:var(--steel);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
  .detail-info .d-tags{display:flex;flex-wrap:wrap;gap:6px;}
  .detail-info .d-tag{
    background:#fff;border:1px solid var(--line);border-radius:999px;
    padding:5px 11px;font-size:12px;color:var(--ink);
  }
  .detail-info .d-note{font-size:13px;color:#555;line-height:1.6;margin-top:4px;}
  .detail-info .d-updated{font-size:11px;color:#aaa;margin-top:6px;}
  .detail-actions{
    position:fixed;bottom:0;left:0;right:0;z-index:55;
    padding:12px 16px;display:flex;gap:10px;
    background:var(--paper);border-top:1px solid var(--line);
    display:none;
  }
  .detail-overlay.show .detail-actions{display:flex;}
  .detail-actions button{
    flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:700;border:none;cursor:pointer;
  }
  .btn-navigate{background:var(--ok);color:#fff;}
  .btn-delete{background:var(--neon);color:#fff;}
  .btn-close-detail{background:#e7e1d0;color:#4a4233;}

  /* ---- Registration Screen ---- */
  #regScreen{background:var(--paper);}
  .reg-header{
    display:flex;align-items:center;gap:12px;
    padding:14px 16px;flex-shrink:0;
    background:linear-gradient(180deg,var(--steel) 0%,var(--steel-deep) 100%);
    color:var(--paper);
  }
  .reg-header button{background:none;border:none;color:var(--paper);font-size:14px;cursor:pointer;padding:6px 10px;border-radius:8px;}
  .reg-header .reg-title{font-size:16px;font-weight:700;flex:1;}
  .reg-steps{display:flex;gap:0;padding:0 16px;background:var(--steel-deep);padding-bottom:10px;}
  .reg-step-indicator{
    flex:1;text-align:center;font-size:11px;color:rgba(255,255,255,.4);
    padding:6px 0;border-bottom:3px solid rgba(255,255,255,.1);
    font-weight:600;
  }
  .reg-step-indicator.active{color:var(--coin);border-bottom-color:var(--coin);}
  .reg-step-indicator.done{color:rgba(255,255,255,.7);border-bottom-color:var(--ok);}

  .reg-body{flex:1;overflow:hidden;display:flex;flex-direction:column;}

  /* Step 1: Map */
  .reg-map-step{flex:1;display:none;flex-direction:column;}
  .reg-map-step.active{display:flex;}
  .reg-map-instruction{
    padding:10px 16px;background:rgba(212,161,58,.1);font-size:13px;color:#8a6c1e;
    text-align:center;font-weight:600;flex-shrink:0;
  }
  .reg-search-bar{
    display:flex;gap:8px;padding:10px 12px;flex-shrink:0;
    background:var(--paper);border-bottom:1px solid var(--line);
  }
  .reg-search-bar input{
    flex:1;min-width:0;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
    font-size:14px;background:#fff;color:var(--ink);
  }
  .reg-search-bar button{
    flex-shrink:0;background:var(--steel);color:#fff;border:none;border-radius:10px;
    padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;
  }
  .reg-search-bar button:active{opacity:.8;}
  .reg-search-bar button:disabled{opacity:.5;cursor:default;}
  #regMap{flex:1;width:100%;min-height:200px;z-index:1;}
  .reg-map-bottom{
    padding:12px 16px;flex-shrink:0;display:flex;gap:10px;align-items:center;
    background:var(--paper);border-top:1px solid var(--line);
  }
  .reg-map-bottom .coord-text{flex:1;font-size:12px;color:#7a6e58;}
  .reg-next-btn{
    background:var(--coin);color:#241a05;border:none;border-radius:10px;
    padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;
  }
  .reg-next-btn:disabled{opacity:.4;cursor:default;}

  /* Step 2: Photo */
  .reg-photo-step{flex:1;display:none;flex-direction:column;padding:20px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .reg-photo-step.active{display:flex;}
  .reg-photo-step .photo-preview{
    flex:none;display:flex;align-items:center;justify-content:center;
    background:#e7e1d0;border-radius:14px;overflow:hidden;margin-bottom:14px;
    height:38vh;min-height:180px;
  }
  .reg-photo-step .photo-preview img{max-width:100%;max-height:100%;object-fit:contain;}
  .reg-photo-step .photo-preview .placeholder{color:#b8ad96;font-size:14px;text-align:center;padding:20px;}
  .photo-btns{display:flex;gap:10px;margin-bottom:14px;flex-shrink:0;}
  .photo-btns label,.photo-btns button{
    flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;
    text-align:center;cursor:pointer;border:1px dashed var(--line);background:#fff;color:var(--ink);
  }
  .photo-btns label:active,.photo-btns button:active{background:#f0ece2;}
  .photo-thumbs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;flex-shrink:0;}
  .photo-thumbs .pt{
    position:relative;width:60px;height:60px;border-radius:8px;overflow:hidden;border:1px solid var(--line);
  }
  .photo-thumbs .pt img{width:100%;height:100%;object-fit:cover;}
  .photo-thumbs .pt .pt-rm{
    position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;
    background:rgba(20,20,20,.7);color:#fff;border:none;font-size:10px;
    line-height:18px;text-align:center;cursor:pointer;padding:0;
  }
  .reg-photo-bottom{flex-shrink:0;display:flex;gap:10px;position:sticky;bottom:0;background:var(--paper);padding:10px 0 4px;margin-top:auto;}
  .reg-photo-bottom button{
    flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;
  }
  .btn-back{background:#e7e1d0;color:#4a4233;}

  /* Step 3: Details Form */
  .reg-form-step{flex:1;display:none;flex-direction:column;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
  .reg-form-step.active{display:flex;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--steel-deep);margin-bottom:6px;letter-spacing:.3px;}
  .field select,.field input[type=text]{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:#fff;
    -webkit-appearance:none;
  }
  .tagrow{display:flex;flex-wrap:wrap;gap:6px;}
  .tagopt{
    border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;font-size:12.5px;cursor:pointer;
    user-select:none;-webkit-user-select:none;
  }
  .tagopt.sel{background:var(--steel);color:#fff;border-color:var(--steel);}
  .reg-form-actions{display:flex;gap:10px;margin-top:10px;padding-bottom:20px;flex-shrink:0;}
  .reg-form-actions button{flex:1;padding:13px;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;}
  .btn-save{background:var(--ok);color:#fff;}

  /* ---- Navigation Screen ---- */
  #navScreen{background:var(--ink);}
  .nav-header{
    display:flex;align-items:center;gap:12px;
    padding:14px 16px;flex-shrink:0;
    background:linear-gradient(180deg,var(--steel) 0%,var(--steel-deep) 100%);
    color:var(--paper);z-index:10;position:relative;
  }
  .nav-header button{background:none;border:none;color:var(--paper);font-size:14px;cursor:pointer;padding:6px 10px;border-radius:8px;}
  .nav-header .nav-title{font-size:16px;font-weight:700;flex:1;}
  #navMap{flex:1;width:100%;z-index:1;}
  .nav-bottom{
    padding:12px 16px;flex-shrink:0;background:var(--paper);border-top:1px solid var(--line);
    display:flex;align-items:center;gap:10px;z-index:10;position:relative;
  }
  .nav-bottom .nav-dest{flex:1;font-size:13px;font-weight:600;color:var(--ink);}
  .nav-bottom .nav-dist{font-size:14px;font-weight:700;color:var(--neon);}
  .fab-switchmap{
    position:absolute;right:16px;bottom:80px;width:44px;height:44px;border-radius:50%;
    background:var(--steel);color:#fff;border:none;font-size:18px;line-height:44px;
    text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.35);z-index:10;cursor:pointer;
  }

  /* ---- Toast ---- */
  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;
    z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;
    max-width:90vw;overflow:hidden;text-overflow:ellipsis;
  }
  .toast.show{opacity:1;}

  /* Leaflet overrides */
  .leaflet-popup-content-wrapper{border-radius:12px;}
  .leaflet-popup-content{margin:12px 14px;font-size:13px;}
</style>
</head>
<body>

<!-- ===== Screen 1: Home ===== -->
<div class="screen active" id="homeScreen">
  <div class="home-header">
    <h1><span class="dot"></span>自販機マップ</h1>
    <div class="sub">みんなで登録・更新するご近所の自販機データベース</div>
    <button class="register-btn" id="startRegBtn">自販機を新規登録</button>
    <div class="mode-label" id="modeLabel"></div>
  </div>
  <div class="card-list" id="cardList">
    <div class="card-list-title" id="cardListTitle">近くの自販機</div>
    <div id="cardsContainer"></div>
  </div>
</div>

<!-- ===== Detail Modal ===== -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-header">
    <span class="detail-title" id="detailTitle">詳細</span>
    <button id="detailCloseBtn">閉じる</button>
  </div>
  <div class="detail-body">
    <div class="detail-photos" id="detailPhotos"></div>
    <div class="detail-info" id="detailInfo"></div>
  </div>
  <div class="detail-actions">
    <button class="btn-navigate" id="detailNavBtn">ここへ行く</button>
    <button class="btn-delete" id="detailDeleteBtn">削除</button>
    <button class="btn-close-detail" id="detailCloseBtn2">閉じる</button>
  </div>
</div>

<!-- ===== Screen 2: Registration ===== -->
<div class="screen" id="regScreen">
  <div class="reg-header">
    <button id="regBackBtn">戻る</button>
    <span class="reg-title">自販機を登録</span>
  </div>
  <div class="reg-steps">
    <div class="reg-step-indicator" id="regStep1Ind">1. 位置</div>
    <div class="reg-step-indicator" id="regStep2Ind">2. 写真</div>
    <div class="reg-step-indicator" id="regStep3Ind">3. 情報</div>
  </div>
  <div class="reg-body">
    <!-- Step 1: Map -->
    <div class="reg-map-step" id="regMapStep">
      <div class="reg-map-instruction">住所で検索するか、位置を地図上でタップしてください</div>
      <div class="reg-search-bar">
        <input type="text" id="regSearchInput" placeholder="住所で検索（例: 大田区池上6-27-14）" autocomplete="off">
        <button type="button" id="regSearchBtn">検索</button>
      </div>
      <div id="regMap"></div>
      <div class="reg-map-bottom">
        <span class="coord-text" id="regCoordText">未選択</span>
        <button class="reg-next-btn" id="regMapNextBtn" disabled>次へ</button>
      </div>
    </div>
    <!-- Step 2: Photo -->
    <div class="reg-photo-step" id="regPhotoStep">
      <div class="photo-preview" id="regPhotoPreview">
        <div class="placeholder">写真を追加してください（任意）</div>
      </div>
      <div class="photo-thumbs" id="regPhotoThumbs"></div>
      <div class="photo-btns">
        <label>
          写真を追加
          <input type="file" id="regPhotoInput" accept="image/*" style="display:none;">
        </label>
      </div>
      <div class="reg-photo-bottom">
        <button class="btn-back" id="regPhotoBackBtn">戻る</button>
        <button class="reg-next-btn" id="regPhotoNextBtn">次へ</button>
      </div>
    </div>
    <!-- Step 3: Form -->
    <div class="reg-form-step" id="regFormStep">
      <div class="field">
        <label>メーカー</label>
        <select id="regMakerSelect">
          <option>コカ・コーラ</option>
          <option>サントリー</option>
          <option>アサヒ飲料</option>
          <option>ダイドードリンコ</option>
          <option>伊藤園</option>
          <option>JR東日本ウォーターズ</option>
          <option>キリン ビバレッジ</option>
          <option>ポッカサッポロ</option>
          <option>その他</option>
        </select>
      </div>
      <div class="field">
        <label>商品ラインナップ（複数選択可）</label>
        <div class="tagrow" id="regProductTags"></div>
      </div>
      <div class="field">
        <label>対応決済方法</label>
        <div class="tagrow" id="regPayTags"></div>
      </div>
      <div class="field">
        <label>メモ（任意）</label>
        <input type="text" id="regNoteInput" placeholder="例: 駅の改札横、自転車置き場前 など">
      </div>
      <div class="reg-form-actions">
        <button class="btn-back" id="regFormBackBtn">戻る</button>
        <button class="btn-save" id="regSaveBtn">保存する</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== Screen 3: Navigation ===== -->
<div class="screen" id="navScreen">
  <div class="nav-header">
    <button id="navBackBtn">戻る</button>
    <span class="nav-title">ナビゲーション</span>
  </div>
  <div id="navMap"></div>
  <button class="fab-switchmap" id="navSwitchMapBtn" title="地図を切り替え">🗺</button>
  <div class="nav-bottom">
    <span class="nav-dest" id="navDest"></span>
    <span class="nav-dist" id="navDistLabel"></span>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ===== Fullscreen photo viewer ===== -->
<div class="photo-viewer" id="photoViewer">
  <button class="photo-viewer-close" id="photoViewerClose">✕</button>
  <img id="photoViewerImg" src="" alt="">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
// ============================================================
// Constants
// ============================================================
const PRODUCT_OPTIONS = ["炭酸","お茶","コーヒー","水","スポーツ飲料","ジュース","エナジー系","カップ自販機","アイス","軽食"];
const PAY_OPTIONS = ["現金","交通系IC","QRコード決済","クレジット(タッチ)","電子マネー"];
const MAX_PHOTOS = 3;
const TOKYO = [35.6812, 139.7671];

// ============================================================
// State
// ============================================================
let machines = [];
let userLat = null, userLng = null;

// Registration state
let regLatLng = null;
let regPhotos = [];
let regSelectedProducts = new Set();
let regSelectedPays = new Set();
let regMap = null;
let regMarker = null;
let regUserMarker = null;
let regStep = 1;

// Navigation state
let navMap = null;
let navRouteLine = null;
let navUserMarker = null;
let navDestMarker = null;
let navTileIndex = 0;
let navActiveTile = null;

// Detail state
let detailMachine = null;
let detailPhotoIndex = 0;
let swipeStartX = 0;

// ============================================================
// Firebase / Firestore
// ============================================================
const firebaseConfig = {

let db = null;

function checkStorage(){
  try{
    const k = '__test__';
    localStorage.setItem(k, '1');
    localStorage.removeItem(k);
    return true;
  }catch(e){ return false; }
}

function loadLocal(){
  if(!storageAvailable) return [];
  try{ return JSON.parse(localStorage.getItem(LS_KEY)) || []; }catch(e){ return []; }
}

function saveLocal(list){
  if(!storageAvailable) return;
  try{
    localStorage.setItem(LS_KEY, JSON.stringify(list));
  }catch(e){
    console.warn('localStorage save failed:', e);
  }
}

function initFirebase(){
  if(firebaseConfig.apiKey === "YOUR_API_KEY"){
    useLocal = true;

function subscribeMachines(){
  if(!db) return;
  db.collection('machines').onSnapshot(
    (snapshot)=>{
      machines = snapshot.docs.map(doc=>({ id: doc.id, ...doc.data() }));
      renderCardList();
    },
    (err)=>{
      console.error(err);
      showToast("データ取得に失敗しました");
    }
  );
}

async function createMachine(data){
  if(useLocal){
    data.id = 'local_' + Date.now();
    machines.push(data);
    saveLocal(machines);
    renderCardList();
    return;
  }
  if(!db) return;
  await db.collection('machines').add(data);
}

async function deleteMachine(id){
  if(useLocal){
    machines = machines.filter(m=>m.id!==id);
    saveLocal(machines);
    renderCardList();
    showToast("削除しました");
    return;
  }
  if(!db) return;
  try{
    await db.collection('machines').doc(id).delete();
    showToast("削除しました");
  }catch(e){
    showToast("削除に失敗しました");
  }
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function haversineDistance(lat1, lng1, lat2, lng2){
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDistance(meters){
  if(meters < 1000) return Math.round(meters) + 'm';
  return (meters / 1000).toFixed(1) + 'km';
}

function timeAgo(ts){
  if(!ts) return '';
  const diff = Date.now() - ts;
  const min = Math.floor(diff/60000);
  if(min < 1) return "たった今";
  if(min < 60) return min + "分前";
  const hr = Math.floor(min/60);
  if(hr < 24) return hr + "時間前";
  const day = Math.floor(hr/24);
  if(day < 30) return day + "日前";
  return new Date(ts).toLocaleDateString('ja-JP');
}

// ============================================================
// EXIF GPS Parsing (preserved from original)
// ============================================================
function readExifGPS(file){
  return new Promise((resolve)=>{
    const slice = file.slice(0, 131072);
    const reader = new FileReader();
    reader.onload = (e)=>{
      try{
        const buf = new DataView(e.target.result);
        if(buf.byteLength < 14 || buf.getUint16(0) !== 0xFFD8){
          resolve(null); return;
        }
        let offset = 2;
        while(offset + 4 < buf.byteLength){
          if(buf.getUint8(offset) !== 0xFF){ offset++; continue; }
          const marker = buf.getUint16(offset);
          if(marker === 0xFFDA) break;
          if(marker === 0xFFD9) break;
          if(offset + 4 >= buf.byteLength) break;
          const segLen = buf.getUint16(offset + 2);
          if(marker === 0xFFE1){
            const result = parseExifSegment(buf, offset + 4, segLen - 2);
            if(result){ resolve(result); return; }
          }
          offset += 2 + segLen;
        }
        resolve(null);
      }catch(ex){
        console.warn('EXIF parse error:', ex);
        resolve(null);
      }
    };
    reader.onerror = ()=> resolve(null);
    reader.readAsArrayBuffer(slice);
  });
}

function parseExifSegment(buf, start, len){
  if(start + 6 >= buf.byteLength) return null;
  if(buf.getUint8(start)!==0x45||buf.getUint8(start+1)!==0x78||
     buf.getUint8(start+2)!==0x69||buf.getUint8(start+3)!==0x66||
     buf.getUint8(start+4)!==0x00||buf.getUint8(start+5)!==0x00) return null;
  const tiff = start + 6;
  if(tiff + 8 >= buf.byteLength) return null;
  const le = buf.getUint16(tiff) === 0x4949;
  const ifd0off = buf.getUint32(tiff + 4, le);
  let gpsOff = findTagValue(buf, tiff, ifd0off, 0x8825, le);
  if(gpsOff === null){
    const nextIfd = getNextIfd(buf, tiff, ifd0off, le);
    if(nextIfd) gpsOff = findTagValue(buf, tiff, nextIfd, 0x8825, le);
  }
  if(gpsOff === null) return null;
  return readGPSData(buf, tiff, gpsOff, le);
}

function findTagValue(buf, tiff, ifdOff, targetTag, le){
  if(tiff + ifdOff + 2 >= buf.byteLength) return null;
  const count = buf.getUint16(tiff + ifdOff, le);
  for(let i = 0; i < count; i++){
    const entry = ifdOff + 2 + i * 12;
    if(tiff + entry + 12 > buf.byteLength) return null;
    const tag = buf.getUint16(tiff + entry, le);
    if(tag === targetTag){
      return buf.getUint32(tiff + entry + 8, le);
    }
  }
  return null;
}

function getNextIfd(buf, tiff, ifdOff, le){
  if(tiff + ifdOff + 2 >= buf.byteLength) return null;
  const count = buf.getUint16(tiff + ifdOff, le);
  const nextPos = ifdOff + 2 + count * 12;
  if(tiff + nextPos + 4 > buf.byteLength) return null;
  const next = buf.getUint32(tiff + nextPos, le);
  return next > 0 ? next : null;
}

function readGPSData(buf, tiff, gpsOff, le){
  if(tiff + gpsOff + 2 >= buf.byteLength) return null;
  const count = buf.getUint16(tiff + gpsOff, le);
  let latRef = 'N', lonRef = 'E', latVals = null, lonVals = null;
  for(let i = 0; i < count; i++){
    const entry = gpsOff + 2 + i * 12;
    if(tiff + entry + 12 > buf.byteLength) break;
    const tag = buf.getUint16(tiff + entry, le);
    const type = buf.getUint16(tiff + entry + 2, le);
    const cnt = buf.getUint32(tiff + entry + 4, le);
    if(tag === 1) latRef = String.fromCharCode(buf.getUint8(tiff + entry + 8));
    if(tag === 3) lonRef = String.fromCharCode(buf.getUint8(tiff + entry + 8));
    if(tag === 2 && type === 5 && cnt === 3) latVals = readRat3(buf, tiff, entry, le);
    if(tag === 4 && type === 5 && cnt === 3) lonVals = readRat3(buf, tiff, entry, le);
  }
  if(!latVals || !lonVals) return null;
  let lat = latVals[0] + latVals[1] / 60 + latVals[2] / 3600;
  let lon = lonVals[0] + lonVals[1] / 60 + lonVals[2] / 3600;
  if(latRef === 'S') lat = -lat;
  if(lonRef === 'W') lon = -lon;
  if(lat === 0 && lon === 0) return null;
  return { lat, lon };
}

function readRat3(buf, tiff, entryOff, le){
  const valOff = buf.getUint32(tiff + entryOff + 8, le);
  if(tiff + valOff + 24 > buf.byteLength) return null;
  const vals = [];
  for(let j = 0; j < 3; j++){
    const num = buf.getUint32(tiff + valOff + j * 8, le);
    const den = buf.getUint32(tiff + valOff + j * 8 + 4, le);
    vals.push(den ? num / den : 0);
  }
  return vals;
}

// ============================================================
// Image Compression (preserved)
// ============================================================
function compressImage(file, maxSize=1280, quality=0.82){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > h && w > maxSize){ h = Math.round(h * maxSize / w); w = maxSize; }
        else if(h > maxSize){ w = Math.round(w * maxSize / h); h = maxSize; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, w, h);
        // Firestore の1ドキュメント上限(約1MB)に収まるよう、大きすぎる場合は段階的に画質を下げる
        let dataUrl = canvas.toDataURL('image/jpeg', quality);
        let q = quality;
        while(dataUrl.length > 900000 && q > 0.5){
          q -= 0.1;
          dataUrl = canvas.toDataURL('image/jpeg', q);
        }
        resolve(dataUrl);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ============================================================
// Geocoding (preserved)
// ============================================================
function normalizeAddress(q){
  return q
    .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .replace(/[ー－—–]/g, '-');
}

function toChome(norm){
  const m = norm.match(/^(.+?)(\d+)[-の](\d+)[-の](\d+)$/);
  if(m) return m[1] + m[2] + '丁目' + m[3] + '番' + m[4] + '号';
  const m2 = norm.match(/^(.+?)(\d+)[-の](\d+)$/);
  if(m2) return m2[1] + m2[2] + '丁目' + m2[3] + '番';
  return null;
}

function buildQueries(norm){
  const queries = [];
  const chome = toChome(norm);
  if(chome) queries.push(chome);
  queries.push(norm);
  let s = norm;
  s = s.replace(/[-の]?\d+号?\s*$/, '');
  if(s !== norm) queries.push(s);
  s = s.replace(/[-の]?\d+番地?\s*$/, '');
  if(!queries.includes(s)) queries.push(s);
  s = s.replace(/[-の]?\d+\s*$/, '');
  if(!queries.includes(s)) queries.push(s);
  s = s.replace(/\d+丁目?/, '').trim();
  if(s && !queries.includes(s)) queries.push(s);
  return queries;
}

async function geocodeGSI(query){
  const url = 'https://msearch.gsi.go.jp/address-search/AddressSearch?q=' + encodeURIComponent(query);
  const res = await fetch(url);
  if(!res.ok) return null;
  const data = await res.json();
  if(!data || !data.length) return null;
  const coords = data[0].geometry.coordinates;
  return { lat: coords[1], lon: coords[0] };
}

async function geocodeNominatim(query){
  const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&accept-language=ja&q=' + encodeURIComponent(query + ', 日本');
  const res = await fetch(url);
  if(!res.ok) return null;
  const data = await res.json();
  return (data && data.length) ? { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) } : null;
}

// 住所の詳細度からズームレベルを決める（号→19, 番地→18, 丁目→17, 地域→15）
function zoomForAddress(norm){
  if(/\d+[-の]\d+[-の]\d+/.test(norm)) return 19; // 号まで
  if(/\d+[-の]\d+/.test(norm)) return 18;           // 番地まで
  if(/\d+丁目?/.test(norm)) return 17;              // 丁目まで
  return 15;                                          // 地域名のみ
}

// 登録画面の住所検索：GSI優先→Nominatimフォールバック、複数候補を順に試す
async function searchRegAddress(){
  const input = document.getElementById('regSearchInput');
  const btn = document.getElementById('regSearchBtn');
  const raw = (input.value || '').trim();
  if(!raw){ return; }

  const norm = normalizeAddress(raw);
  const queries = buildQueries(norm);
  const zoom = zoomForAddress(norm);

  btn.disabled = true;
  const prevLabel = btn.textContent;
  btn.textContent = '検索中';
  try{
    let hit = null;
    for(const q of queries){
      try{ hit = await geocodeGSI(q); }catch(e){ hit = null; }
      if(hit) break;
    }
    if(!hit){
      for(const q of queries){
        try{ hit = await geocodeNominatim(q); }catch(e){ hit = null; }
        if(hit) break;
      }
    }
    if(!hit){
      showToast('該当する場所が見つかりませんでした');
      return;
    }
    if(regMap){
      regMap.flyTo([hit.lat, hit.lon], zoom, {duration: 0.8});
    }
  } finally {
    btn.disabled = false;
    btn.textContent = prevLabel;
  }
}

// Home Screen: Card List
// ============================================================
function renderCardList(){
  const container = document.getElementById('cardsContainer');
  const title = document.getElementById('cardListTitle');

  if(machines.length === 0){
    title.textContent = '';
    container.innerHTML = '<div class="empty-msg">近くに登録された自販機はありません</div>';
    return;
  }

  // Sort by distance from user
  let sorted = machines.map(m => {
    let dist = null;
    if(userLat !== null && userLng !== null){
      dist = haversineDistance(userLat, userLng, m.lat, m.lng);
    }
    return { ...m, _dist: dist };
  });

  if(userLat !== null){
    sorted.sort((a, b) => (a._dist || 0) - (b._dist || 0));
  }

  title.textContent = `近くの自販機（${sorted.length}件）`;

  container.innerHTML = sorted.map(m => {
    const photoHtml = (m.photos && m.photos.length)
      ? `<img src="${m.photos[0]}" alt="">`
      : '🥤';
    const distText = m._dist !== null ? formatDistance(m._dist) : '';
    const productsText = (m.products && m.products.length) ? m.products.join('・') : '';
    return `
      <div class="vm-card" data-id="${m.id}">
        <div class="vm-card-photo">${photoHtml}</div>
        <div class="vm-card-info">
          <div class="vm-card-maker">${escapeHtml(m.maker)}</div>
          ${distText ? `<div class="vm-card-dist">${distText}</div>` : ''}
          <div class="vm-card-products">${escapeHtml(productsText) || '（商品情報なし）'}</div>
        </div>
      </div>
    `;
  }).join('');

  // Attach click handlers
  container.querySelectorAll('.vm-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      const m = machines.find(x => x.id === id);
      if(m) openDetail(m);
    });
  });
}

// Detail Modal
// ============================================================
function openDetail(machine){
  detailMachine = machine;
  detailPhotoIndex = 0;

  document.getElementById('detailTitle').textContent = machine.maker || '詳細';

  // Photos
  const photosEl = document.getElementById('detailPhotos');
  const photos = machine.photos || [];
  if(photos.length === 0){
    photosEl.innerHTML = '<div class="no-photo">🥤</div>';
  } else {
    let slidesHtml = photos.map(p => `<div class="swipe-slide"><img src="${p}"></div>`).join('');
    let dotsHtml = photos.length > 1
      ? '<div class="photo-dots">' + photos.map((_, i) => `<span class="${i===0?'active':''}"></span>`).join('') + '</div>'
      : '';
    photosEl.innerHTML = `<div class="swipe-container" id="swipeContainer">${slidesHtml}</div>${dotsHtml}`;

    // タップで全画面表示（スワイプと区別する）
    let suppressTap = false;
    photosEl.querySelectorAll('.swipe-slide img').forEach((imgEl, i) => {
      imgEl.addEventListener('click', () => {
        if(suppressTap){ suppressTap = false; return; }
        openPhotoViewer(photos[detailPhotoIndex] || photos[i]);
      });
    });

    if(photos.length > 1){
      const swipeCont = document.getElementById('swipeContainer');
      swipeCont.addEventListener('touchstart', (e) => {
        swipeStartX = e.touches[0].clientX;
      }, {passive:true});
      swipeCont.addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].clientX - swipeStartX;
        if(Math.abs(dx) > 50){
          suppressTap = true; // スワイプ後のクリックでビューアを開かない
          if(dx < 0 && detailPhotoIndex < photos.length - 1) detailPhotoIndex++;
          if(dx > 0 && detailPhotoIndex > 0) detailPhotoIndex--;
          swipeCont.style.transform = `translateX(-${detailPhotoIndex * 100}%)`;
          photosEl.querySelectorAll('.photo-dots span').forEach((dot, i) => {
            dot.classList.toggle('active', i === detailPhotoIndex);
          });
        }
      }, {passive:true});
    }
  }

  // Info
  const infoEl = document.getElementById('detailInfo');
  const products = machine.products || [];
  const pays = machine.pays || [];
  infoEl.innerHTML = `
    <div class="d-maker">${escapeHtml(machine.maker)}</div>
    ${products.length ? `
      <div class="d-section">
        <div class="d-label">商品ラインナップ</div>
        <div class="d-tags">${products.map(p=>`<span class="d-tag">${escapeHtml(p)}</span>`).join('')}</div>
      </div>
    ` : ''}
    ${pays.length ? `
      <div class="d-section">
        <div class="d-label">対応決済方法</div>
        <div class="d-tags">${pays.map(p=>`<span class="d-tag">${escapeHtml(p)}</span>`).join('')}</div>
      </div>
    ` : ''}
    ${machine.note ? `
      <div class="d-section">
        <div class="d-label">メモ</div>
        <div class="d-note">${escapeHtml(machine.note)}</div>
      </div>
    ` : ''}
    <div class="d-updated">最終更新: ${timeAgo(machine.updatedAt)}</div>
  `;

  document.getElementById('detailOverlay').classList.add('show');
}

  detailMachine = null;

  if(userLat !== null){
    showRegUserLocation();
  } else if(navigator.geolocation){
    document.getElementById('regCoordText').textContent = '現在地を取得中...';
    try{
      navigator.geolocation.getCurrentPosition(
        pos => {
          userLat = pos.coords.latitude;
          userLng = pos.coords.longitude;
          renderCardList();
          regMap.setView([userLat, userLng], 16);
          showRegUserLocation();
          if(!regLatLng) document.getElementById('regCoordText').textContent = '未選択';
        },
        () => { if(!regLatLng) document.getElementById('regCoordText').textContent = '未選択'; },
        {enableHighAccuracy:true, timeout:8000, maximumAge:60000}
      );
    }catch(e){ document.getElementById('regCoordText').textContent = '未選択'; }
  }
}

// 登録地図上に現在地（青い点）を表示
function showRegUserLocation(){
  if(!regMap || userLat === null) return;
  if(regUserMarker) regMap.removeLayer(regUserMarker);
  regUserMarker = L.circleMarker([userLat, userLng], {
    radius: 8, color:'#fff', weight:2, fillColor:'#2a7de1', fillOpacity:1
  }).addTo(regMap).bindTooltip('現在地', {permanent:false});
}

function showRegStep(step){
  regStep = step;
  document.getElementById('regMapStep').classList.toggle('active', step === 1);
  document.getElementById('regPhotoStep').classList.toggle('active', step === 2);
  document.getElementById('regFormStep').classList.toggle('active', step === 3);

  const ind1 = document.getElementById('regStep1Ind');
  const ind2 = document.getElementById('regStep2Ind');
  const ind3 = document.getElementById('regStep3Ind');

  ind1.className = 'reg-step-indicator' + (step === 1 ? ' active' : (step > 1 ? ' done' : ''));
  ind2.className = 'reg-step-indicator' + (step === 2 ? ' active' : (step > 2 ? ' done' : ''));
  ind3.className = 'reg-step-indicator' + (step === 3 ? ' active' : '');

  if(step === 1){
    setTimeout(()=>{ try{ regMap.invalidateSize(); }catch(e){} }, 100);
  }
  if(step === 2){
    renderRegPhotoStep();
  }
  if(step === 3){
    buildRegTagOptions();
  }
}

function renderRegPhotoStep(){
  const preview = document.getElementById('regPhotoPreview');
  const thumbs = document.getElementById('regPhotoThumbs');

  if(regPhotos.length === 0){
    preview.innerHTML = '<div class="placeholder">写真を追加してください（任意）</div>';
  } else {
    preview.innerHTML = `<img src="${regPhotos[regPhotos.length - 1]}">`;
  }

  thumbs.innerHTML = regPhotos.map((p, i) => `
    <div class="pt">
      <img src="${p}">
      <button class="pt-rm" data-idx="${i}">✕</button>
    </div>
  `).join('');

  thumbs.querySelectorAll('.pt-rm').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx);
      regPhotos.splice(idx, 1);
      renderRegPhotoStep();
    });
  });
}

document.getElementById('regPhotoInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  e.target.value = '';
  if(!file) return;
  if(regPhotos.length >= MAX_PHOTOS){
    showToast("写真は3枚までです");
    return;
  }
  try{
    // Check EXIF for GPS — if found and no location set yet, use it
    const gps = await readExifGPS(file);
    if(gps && !regLatLng){
      regLatLng = L.latLng(gps.lat, gps.lon);
      showToast("写真の撮影地点を位置として設定しました");
    }
    const dataUrl = await compressImage(file);
    regPhotos.push(dataUrl);
    renderRegPhotoStep();
  }catch(err){
    showToast("写真の処理に失敗しました");
  }
});

function buildRegTagOptions(){
  const pWrap = document.getElementById('regProductTags');
  pWrap.innerHTML = '';
  PRODUCT_OPTIONS.forEach(p => {
    const el = document.createElement('div');
    el.className = 'tagopt' + (regSelectedProducts.has(p) ? ' sel' : '');
    el.textContent = p;
    el.onclick = () => {
      if(regSelectedProducts.has(p)) regSelectedProducts.delete(p); else regSelectedProducts.add(p);
      el.classList.toggle('sel');
    };
    pWrap.appendChild(el);
  });

  const payWrap = document.getElementById('regPayTags');
  payWrap.innerHTML = '';
  PAY_OPTIONS.forEach(p => {
    const el = document.createElement('div');
    el.className = 'tagopt' + (regSelectedPays.has(p) ? ' sel' : '');
    el.textContent = p;
    el.onclick = () => {
      if(regSelectedPays.has(p)) regSelectedPays.delete(p); else regSelectedPays.add(p);
      el.classList.toggle('sel');
    };
    payWrap.appendChild(el);
  });
}

async function saveRegistration(){
  if(!regLatLng){
    showToast("位置が未設定です");
    return;
  }

  const maker = document.getElementById('regMakerSelect').value;
  const note = document.getElementById('regNoteInput').value.trim();
  const payload = {
    lat: regLatLng.lat,
    lng: regLatLng.lng,
    maker,
    products: Array.from(regSelectedProducts),
    pays: Array.from(regSelectedPays),
    note,
    photos: regPhotos.slice(),
    updatedAt: Date.now()
  };

  const saveBtn = document.getElementById('regSaveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = '保存中...';
  try{
    await createMachine(payload);
    showToast("保存しました");
    showScreen('homeScreen');
    renderCardList();
  }catch(e){
    console.error(e);
    showToast("保存に失敗: " + (e.message || e));
  }finally{
    saveBtn.disabled = false;
    saveBtn.textContent = '保存する';
  }
}

// Registration button handlers
document.getElementById('startRegBtn').addEventListener('click', startRegistration);

// 住所検索（ボタン / Enterキー）
document.getElementById('regSearchBtn').addEventListener('click', searchRegAddress);
document.getElementById('regSearchInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){ e.preventDefault(); searchRegAddress(); }
});

document.getElementById('regBackBtn').addEventListener('click', () => {
  if(regStep > 1){
    showRegStep(regStep - 1);
  } else {
    showScreen('homeScreen');
  }
});

document.getElementById('regMapNextBtn').addEventListener('click', () => {
  if(!regLatLng){
    showToast("位置を地図上でタップしてください");
    return;
  }
  showRegStep(2);
});

document.getElementById('regPhotoBackBtn').addEventListener('click', () => showRegStep(1));

document.getElementById('regPhotoNextBtn').addEventListener('click', () => showRegStep(3));

document.getElementById('regFormBackBtn').addEventListener('click', () => showRegStep(2));

document.getElementById('regSaveBtn').addEventListener('click', saveRegistration);

// ============================================================
// Navigation Screen
// ============================================================
function openNavigation(machine){
  showScreen('navScreen');
  document.getElementById('navDest').textContent = machine.maker + (machine.note ? ' - ' + machine.note : '');

  const destLat = machine.lat;
  const destLng = machine.lng;

  // Distance
  if(userLat !== null){
    const dist = haversineDistance(userLat, userLng, destLat, destLng);
    document.getElementById('navDistLabel').textContent = formatDistance(dist);
  } else {
    document.getElementById('navDistLabel').textContent = '';
  }

  if(!navMap){
    navMap = L.map('navMap', {zoomControl:true, maxZoom:19}).setView([destLat, destLng], 16);
    navTileIndex = 0;
    navActiveTile = addTileLayer(navMap, 0);
  } else {
    navMap.setView([destLat, destLng], 16);
  }

  // Clear old markers/route
  if(navUserMarker){ navMap.removeLayer(navUserMarker); navUserMarker = null; }
  if(navDestMarker){ navMap.removeLayer(navDestMarker); navDestMarker = null; }
  if(navRouteLine){ navMap.removeLayer(navRouteLine); navRouteLine = null; }

  // Dest marker (red)
  navDestMarker = L.circleMarker([destLat, destLng], {
    radius:12, color:'#c0392b', weight:3, fillColor:'#ff5a3c', fillOpacity:0.9
  }).addTo(navMap);

  // User marker (blue)
  if(userLat !== null){
    navUserMarker = L.circleMarker([userLat, userLng], {
      radius:10, color:'#1a5276', weight:3, fillColor:'#3498db', fillOpacity:0.9
    }).addTo(navMap);

    // Fit bounds
    const bounds = L.latLngBounds([[userLat, userLng], [destLat, destLng]]);
    navMap.fitBounds(bounds, {padding:[50,50]});

    // Get walking route from OSRM
    fetchRoute(userLat, userLng, destLat, destLng);
  }

  setTimeout(()=>{ try{ navMap.invalidateSize(); }catch(e){} }, 150);
}

async function fetchRoute(lat1, lng1, lat2, lng2){
  try{
    const url = `https://router.project-osrm.org/route/v1/foot/${lng1},${lat1};${lng2},${lat2}?overview=full&geometries=geojson`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('OSRM error');
    const data = await res.json();
    if(data.routes && data.routes.length > 0){
      const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
      if(navRouteLine){ navMap.removeLayer(navRouteLine); }
      navRouteLine = L.polyline(coords, {
        color: '#3498db',
        weight: 4,
        dashArray: '10, 8',
        opacity: 0.8
      }).addTo(navMap);
    }
  }catch(e){
    console.warn('OSRM routing failed, falling back to straight line:', e);
    // Fallback: straight dashed line
    if(navRouteLine){ navMap.removeLayer(navRouteLine); }
    navRouteLine = L.polyline([[lat1, lng1], [lat2, lng2]], {
      color: '#3498db',
      weight: 3,
      dashArray: '10, 8',
      opacity: 0.7
    }).addTo(navMap);
  }
}

document.getElementById('navBackBtn').addEventListener('click', () => {
  showScreen('homeScreen');
});

document.getElementById('navSwitchMapBtn').addEventListener('click', () => {
  if(!navMap) return;
  navTileIndex = (navTileIndex + 1) % TILE_LAYERS.length;
  if(navActiveTile) navMap.removeLayer(navActiveTile);
  navActiveTile = addTileLayer(navMap, navTileIndex);
  showToast(TILE_LAYERS[navTileIndex].name);
});

// ============================================================
// Geolocation
// ============================================================
function geolocateUser(){
  if(!navigator.geolocation) return;
  try{
    navigator.geolocation.getCurrentPosition(
      pos => {
        userLat = pos.coords.latitude;
        userLng = pos.coords.longitude;
        renderCardList();
      },
      () => { /* denied/failed - cards still show, just without distance */ },
      {timeout:8000, maximumAge:60000}
    );
  }catch(e){
    // Permissions-Policy block etc.
  }
}

// ============================================================
// Init
// ============================================================
(function init(){
  const ok = initFirebase();
  if(ok) subscribeMachines();
  renderCardList();
  geolocateUser();
})();
</script>
